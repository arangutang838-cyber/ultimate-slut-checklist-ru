    :root {
      --bg: #0a0a0a;
      --surface: #131313;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #666;
      --accent: #e8c547;
      --green: #4ade80;
      --easy: #4ade80;
      --medium: #facc15;
      --hard: #f97316;
      --extreme: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .topbar-title {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .topbar-stats {
      display: flex;
      gap: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
    }

    .topbar-stat { color: var(--muted); }
    .topbar-stat span { color: var(--text); font-weight: 500; }

    /* ── DIFFICULTY SELECTOR ── */
    .difficulty-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .difficulty-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-right: 6px;
    }

    .diff-btn {
      padding: 6px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .diff-btn:hover { border-color: var(--text); color: var(--text); }

    .diff-btn.active[data-level="1"] { background: var(--easy); border-color: var(--easy); color: #000; }
    .diff-btn.active[data-level="2"] { background: var(--medium); border-color: var(--medium); color: #000; }
    .diff-btn.active[data-level="3"] { background: var(--hard); border-color: var(--hard); color: #000; }
    .diff-btn.active[data-level="4"] { background: var(--extreme); border-color: var(--extreme); color: #fff; }

    .diff-hint {
      font-size: 0.72rem;
      color: var(--muted);
      margin-left: auto;
    }

    /* ── MAIN LAYOUT ── */
    .main {
      padding: 28px 20px 60px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── GLOBAL PROGRESS ── */
    .global-progress {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .progress-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .progress-pct {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      min-width: 40px;
    }

    /* ── CATEGORIES GRID ── */
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .category-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .category-card:hover { border-color: #3a3a3a; }

    .category-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .category-name {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .category-desc {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 400;
      margin-top: 2px;
    }

    .category-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .category-meta .pts { color: var(--accent); }

    /* ── CATEGORY PROGRESS BAR ── */
    .category-progress {
      height: 2px;
      background: var(--border);
    }

    .category-progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    /* ── TASK LIST ── */
    .task-list {
      padding: 6px 0;
    }

    .task-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 18px;
      cursor: pointer;
      transition: background 0.12s;
      border-bottom: 1px solid transparent;
    }

    .task-row:hover { background: var(--surface2); }

    .task-row:last-child { border-bottom: none; }

    .task-check {
      width: 16px;
      height: 16px;
      min-width: 16px;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      position: relative;
      transition: all 0.15s;
      background: transparent;
    }

    .task-row.done .task-check {
      background: var(--green);
      border-color: var(--green);
    }

    .task-check::after {
      content: '';
      position: absolute;
      top: 2px; left: 4px;
      width: 5px; height: 8px;
      border: 1.5px solid #000;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) scale(0);
      transition: transform 0.15s;
    }

    .task-row.done .task-check::after { transform: rotate(45deg) scale(1); }

    .task-name {
      flex: 1;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.15s;
      line-height: 1.35;
    }

    .task-row.done .task-name {
      color: var(--muted);
      text-decoration: line-through;
    }

    .task-diff-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .task-diff-dot[data-d="1"] { background: var(--easy); }
    .task-diff-dot[data-d="2"] { background: var(--medium); }
    .task-diff-dot[data-d="3"] { background: var(--hard); }
    .task-diff-dot[data-d="4"] { background: var(--extreme); }

    .task-pts {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .task-row.done .task-pts { color: var(--green); }

    /* ── EMPTY CATEGORY ── */
    .cat-empty {
      padding: 18px;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      display: none;
    }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      gap: 10px;
      margin-top: 32px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 24px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: all 0.15s;
    }

    .btn:hover { border-color: var(--text); color: var(--text); }

    .btn-danger:hover { border-color: var(--extreme); color: var(--extreme); }

    /* ── LEGEND ── */
    .legend {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    @media (max-width: 600px) {
      .topbar { padding: 10px 14px; }
      .diff-hint { display: none; }
      .categories-grid { grid-template-columns: 1fr; }
      .main { padding: 16px 12px 50px; }
    }
  </style>
</head>

//  STATE
// ═══════════════════════════════════════════
let currentDiff = 1; // active max difficulty level
let checked = {};    // { taskIndex: true/false }

function loadState() {
  try {
    const s = localStorage.getItem('uc_state');
    if (s) { const p = JSON.parse(s); checked = p.checked || {}; currentDiff = p.diff || 1; }
  } catch(e) {}
}

function saveState() {
  localStorage.setItem('uc_state', JSON.stringify({ checked, diff: currentDiff }));
}

//  HELPERS
// ═══════════════════════════════════════════
function visibleTasks() {
  return tasks.filter(t => t.difficulty <= currentDiff);
}

function taskId(index) { return 'task_' + index; }

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const visible = visibleTasks();
  
  // Найдём обратное соответствие: название категории -> ключ
  const catNameToKey = {};
  Object.entries(categories).forEach(([key, val]) => {
    catNameToKey[val.name] = key;
  });

  // group by category preserving order
  const catOrder = Object.keys(categories);
  const grouped = {};
  catOrder.forEach(k => grouped[k] = []);
  tasks.forEach((t, idx) => {
    if (t.difficulty <= currentDiff) {
      const catKey = catNameToKey[t.category] || t.category;
      grouped[catKey]?.push({ task: t, idx });
    }
  });

    const items = grouped[catKey];
    const catDef = categories[catKey];
    if (!catDef) return;

    // always show category card (even empty, hide empty msg)
    const totalPts = items.reduce((s, { task }) => s + task.points, 0);
    const donePts  = items.reduce((s, { task, idx }) => s + (checked[taskId(idx)] ? task.points : 0), 0);

    const card = document.createElement('div');
    card.className = 'category-card';

        <div>
          <div class="category-name">${catDef.name}</div>
          ${catDef.description ? `<div class="category-desc">${catDef.description}</div>` : ''}

        <div class="category-meta">
          <span>${doneCount} / ${items.length}</span>

      </div>
      <div class="category-progress">
        <div class="category-progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="task-list" id="cat-${catKey}"></div>
      ${items.length === 0 ? `<div class="cat-empty" style="display:block">No tasks at this difficulty</div>` : ''}
    `;

    grid.appendChild(card);

    const list = card.querySelector(`#cat-${catKey}`);
    items.forEach(({ task, idx }) => {
      const id = taskId(idx);
      const done = !!checked[id];

      const row = document.createElement('div');
      row.className = 'task-row' + (done ? ' done' : '');
      row.innerHTML = `
        <div class="task-check"></div>
        <span class="task-diff-dot" data-d="${task.difficulty}"></span>
        <span class="task-name">${task.name}</span>
        <span class="task-pts">${task.points} pt${task.points !== 1 ? 's' : ''}</span>
      `;
      row.addEventListener('click', () => {
        checked[id] = !checked[id];
        saveState();
        render();
      });
      list.appendChild(row);
    });
  });

  updateGlobal(visible);
}

function updateGlobal(visible) {
  const total = visible.length;
  const done  = visible.filter((t, i) => {
    // find original index
    const origIdx = tasks.indexOf(t);
    return checked[taskId(origIdx)];
  }).length;
  const totalPts = visible.reduce((s, t) => s + t.points, 0);
  const donePts  = visible.reduce((s, t) => {
    const origIdx = tasks.indexOf(t);
    return s + (checked[taskId(origIdx)] ? t.points : 0);
  }, 0);
  const pct = total ? Math.round(done / total * 100) : 0;

  document.getElementById('statTasks').textContent  = `${done} / ${total}`;
  document.getElementById('statPoints').textContent = `${donePts} / ${totalPts}`;
  document.getElementById('globalBar').style.width  = pct + '%';
  document.getElementById('globalPct').textContent  = pct + '%';
}

// ═══════════════════════════════════════════
//  DIFFICULTY BUTTONS
// ═══════════════════════════════════════════
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentDiff = parseInt(btn.dataset.level);
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    saveState();
    render();
  });
});

// ═══════════════════════════════════════════
//  RESET
// ═══════════════════════════════════════════
document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Reset all progress?')) {
    checked = {};
    saveState();
    render();
  }
});

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
loadState();
// sync active button to loaded diff
document.querySelectorAll('.diff-btn').forEach(b => {
  b.classList.toggle('active', parseInt(b.dataset.level) === currentDiff);
});
render();
</script>
</body>
</html>
