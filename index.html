  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate Checklist</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #131313;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #666;
      --accent: #e8c547;
      --green: #4ade80;
      --easy: #4ade80;
      --medium: #facc15;
      --hard: #f97316;
      --extreme: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .topbar-title {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .topbar-stats {
      display: flex;
      gap: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
    }

    .topbar-stat { color: var(--muted); }
    .topbar-stat span { color: var(--text); font-weight: 500; }

    .difficulty-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .difficulty-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-right: 6px;
    }

    .diff-btn {
      padding: 6px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .diff-btn:hover { border-color: var(--text); color: var(--text); }
    .diff-btn.active[data-level="1"] { background: var(--easy); border-color: var(--easy); color: #000; }
    .diff-btn.active[data-level="2"] { background: var(--medium); border-color: var(--medium); color: #000; }
    .diff-btn.active[data-level="3"] { background: var(--hard); border-color: var(--hard); color: #000; }
    .diff-btn.active[data-level="4"] { background: var(--extreme); border-color: var(--extreme); color: #fff; }

    .diff-hint { font-size: 0.72rem; color: var(--muted); margin-left: auto; }

    .main {
      padding: 28px 20px 60px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .global-progress {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .progress-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .progress-pct {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      min-width: 40px;
    }

    .categories-grid {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .categories-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .category-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .category-card:hover { border-color: #3a3a3a; }

    .category-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .category-name {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .category-desc {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 400;
      margin-top: 2px;
    }

    .category-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .category-meta .pts { color: var(--accent); }

    .category-progress { height: 2px; background: var(--border); }
    .category-progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .task-list { padding: 6px 0; }

    .task-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 18px;
      cursor: pointer;
      transition: background 0.12s;
      border-bottom: 1px solid transparent;
    }

    .task-row:hover { background: var(--surface2); }
    .task-row:last-child { border-bottom: none; }

    .task-check {
      width: 16px;
      height: 16px;
      min-width: 16px;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      position: relative;
      transition: all 0.15s;
      background: transparent;
    }

    .task-row.done .task-check {
      background: var(--green);
      border-color: var(--green);
    }

    .task-check::after {
      content: '';
      position: absolute;
      top: 2px; left: 4px;
      width: 5px; height: 8px;
      border: 1.5px solid #000;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) scale(0);
      transition: transform 0.15s;
    }

    .task-row.done .task-check::after { transform: rotate(45deg) scale(1); }

    .task-name {
      flex: 1;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.15s;
      line-height: 1.35;
    }

    .task-row.done .task-name { color: var(--muted); text-decoration: line-through; }

    .task-diff-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .task-diff-dot[data-d="1"] { background: var(--easy); }
    .task-diff-dot[data-d="2"] { background: var(--medium); }
    .task-diff-dot[data-d="3"] { background: var(--hard); }
    .task-diff-dot[data-d="4"] { background: var(--extreme); }

    .task-pts {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .task-row.done .task-pts { color: var(--green); }

    .cat-empty {
      padding: 18px;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      display: none;
    }

    .btn {
      padding: 10px 24px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: all 0.15s;
    }

    .btn:hover { border-color: var(--text); color: var(--text); }
    .btn-danger:hover { border-color: var(--extreme); color: var(--extreme); }

    .legend {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    .lang-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: all 0.15s;
      text-transform: uppercase;
    }
    .lang-btn:hover { border-color: var(--accent); color: var(--accent); }
    .lang-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,197,71,0.08); }

    /* ── Rating mode toggle ── */
    .mode-toggle {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }
    .mode-btn {
      padding: 5px 12px;
      border-radius: 5px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .mode-btn:hover { color: var(--text); }
    .mode-btn.active { background: var(--accent); color: #000; }

    /* ── Rating stars row ── */
    .rating-widget {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-left: auto;
    }
    .rating-btn {
      width: 26px;
      height: 26px;
      border-radius: 5px;
      border: 1px solid transparent;
      background: transparent;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      transition: all 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      opacity: 0.35;
    }
    .rating-btn:hover { opacity: 1; transform: scale(1.2); }
    .rating-btn.active { opacity: 1; background: var(--surface2); border-color: var(--border); }

    /* rating legend bar */
    .rating-legend-bar { gap: 18px; }
    .rating-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .rating-legend-icon { font-size: 1rem; line-height: 1; }

    /* rating level colors when active */
    .rating-btn[data-r="1"].active { background: rgba(239,68,68,0.15); border-color: #ef4444; }
    .rating-btn[data-r="2"].active { background: rgba(250,204,21,0.15); border-color: #facc21; }
    .rating-btn[data-r="3"].active { background: rgba(74,222,128,0.15); border-color: #4ade80; }
    .rating-btn[data-r="4"].active { background: rgba(96,165,250,0.15); border-color: #60a5fa; }
    .rating-btn[data-r="5"].active { background: rgba(244,114,182,0.15); border-color: #f472b6; }

    /* hide pts in rating mode */
    body.rating-mode .task-pts { display: none; }
    body.rating-mode .task-check { display: none; }
    body.rating-mode .task-row { cursor: default; }
    body.rating-mode .task-row.done { opacity: 1; }
    body.rating-mode .task-row.done .task-name { color: var(--text); text-decoration: none; }
    body.rating-mode .topbar-stat.pts-stat { display: none; }
    body.rating-mode .category-meta .pts { display: none; }

    /* rating summary in category header */
    .rating-summary {
      display: none;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
    body.rating-mode .rating-summary { display: block; }
    body.rating-mode .check-count { display: none; }

    /* progress bar in rating mode shows % rated */
    body.rating-mode .progress-fill { background: #f472b6; }
    body.rating-mode .category-progress-fill { background: #f472b6; }

    @media (max-width: 1200px) {
      .categories-grid { gap: 12px; }
    }
    @media (max-width: 860px) {
      .categories-grid { flex-wrap: wrap; }
      .categories-col { flex: 1 1 45%; }
    }
    @media (max-width: 600px) {
      .topbar { padding: 10px 14px; }
      .diff-hint { display: none; }
      .categories-grid { flex-direction: column; }
      .categories-col { flex: 1 1 100%; }
      .main { padding: 16px 12px 50px; }
    }
  </style>
</head>

  { name: "Was kicked in balls and girlfriend recorded it on video", points: 7, category: "chastity_ballbusting", difficulty: 3 },
  { name: "Got ballbusting as punishment for breaking rules", points: 6, category: "chastity_ballbusting", difficulty: 3 },
];

let currentDiff = 1;
let checked = {};
let ratings = {};

function loadState() {
  try {
    const s = localStorage.getItem('uc_state');
    if (s) { const p = JSON.parse(s); checked = p.checked || {}; ratings = p.ratings || {}; currentDiff = p.diff || 1; currentLang = p.lang || 'en'; currentMode = p.mode || 'checklist'; }
  } catch(e) {}
}

function saveState() {
  localStorage.setItem('uc_state', JSON.stringify({ checked, ratings, diff: currentDiff, lang: currentLang, mode: currentMode }));
}

function taskId(index) { return 'task_' + index; }

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const cats = currentLang === 'ru' ? categoriesRu : categories;
  const taskList = (currentLang === 'ru' && tasksRu.length === tasks.length) ? tasksRu : tasks;

  const catOrder = Object.keys(cats);
  const grouped = {};
  catOrder.forEach(k => grouped[k] = []);
  taskList.forEach((t, idx) => {
    if (t.difficulty <= currentDiff && grouped[t.category] !== undefined) {
      grouped[t.category].push({ task: t, idx });
    }
  });

  // Split categories into 4 columns evenly by count
  const numCols = 4;
  const perCol = Math.ceil(catOrder.length / numCols);
  const columns = [];
  for (let i = 0; i < numCols; i++) {
    const col = document.createElement('div');
    col.className = 'categories-col';
    grid.appendChild(col);
    columns.push(col);
  }

  catOrder.forEach((catKey, i) => {
    const colIdx = i % numCols;
    const col = columns[colIdx];
    const items = grouped[catKey];
    const catDef = cats[catKey];
    if (!catDef) return;

    const isRating = currentMode === 'rating';
    const totalPts  = items.reduce((s, { task }) => s + task.points, 0);
    const donePts   = items.reduce((s, { task, idx }) => s + (checked[taskId(idx)] ? task.points : 0), 0);
    const doneCount = items.filter(({ idx }) => checked[taskId(idx)]).length;
    const ratedCount = items.filter(({ idx }) => ratings[taskId(idx)]).length;
    const pct = isRating
      ? (items.length ? Math.round(ratedCount / items.length * 100) : 0)
      : (items.length ? Math.round(doneCount / items.length * 100) : 0);

    const card = document.createElement('div');
    card.className = 'category-card';
    card.innerHTML = `
      <div class="category-header">
        <div>
          <div class="category-name">${catDef.name}</div>
          ${catDef.description ? `<div class="category-desc">${catDef.description}</div>` : ''}
        </div>
        <div class="category-meta">
          <span class="check-count">${doneCount} / ${items.length}</span>
          <span class="rating-summary">${ratedCount} / ${items.length} rated</span>
          <span class="pts">${donePts} / ${totalPts} pts</span>
        </div>
      </div>
      <div class="category-progress">
        <div class="category-progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="task-list" id="cat-${catKey}"></div>
      ${items.length === 0 ? `<div class="cat-empty" style="display:block">${currentLang === 'ru' ? 'Нет заданий на этом уровне' : 'No tasks at this difficulty'}</div>` : ''}
    `;

    col.appendChild(card);

    const list = card.querySelector(`#cat-${catKey}`);
    items.forEach(({ task, idx }) => {
      const id = taskId(idx);
      const done = !!checked[id];
      const currentRating = ratings[id] || 0;
      const row = document.createElement('div');
      row.className = 'task-row' + (done ? ' done' : '');

      if (isRating) {
        // Rating mode: show emoji rating buttons
        const ratingBtns = [1,2,3,4,5].map(r => {
          const lbl = currentLang === 'ru' ? RATING_LABELS_RU[r] : RATING_LABELS_EN[r];
          return `<button class="rating-btn${currentRating === r ? ' active' : ''}" data-r="${r}" title="${lbl}">${RATING_ICONS[r]}</button>`;
        }).join('');
        row.innerHTML = `
          <span class="task-diff-dot" data-d="${task.difficulty}"></span>
          <span class="task-name">${task.name}</span>
          <div class="rating-widget">${ratingBtns}</div>
        `;
        row.querySelectorAll('.rating-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const r = parseInt(btn.dataset.r);
            ratings[id] = (ratings[id] === r) ? 0 : r; // toggle off if same
            saveState();
            render();
          });
        });
      } else {
        // Checklist mode: original behavior
        row.innerHTML = `
          <div class="task-check"></div>
          <span class="task-diff-dot" data-d="${task.difficulty}"></span>
          <span class="task-name">${task.name}</span>
          <span class="task-pts">${task.points} pt${task.points !== 1 ? 's' : ''}</span>
        `;
        row.addEventListener('click', () => {
          checked[id] = !checked[id];
          saveState();
          render();
        });
      }
      list.appendChild(row);
    });
  });

  updateGlobal();
}

function updateGlobal() {
  const visible = tasks.filter(t => t.difficulty <= currentDiff);
  const total    = visible.length;
  const totalPts = visible.reduce((s, t) => s + t.points, 0);
  let done = 0, donePts = 0, rated = 0;
  tasks.forEach((t, idx) => {
    if (t.difficulty <= currentDiff) {
      if (checked[taskId(idx)]) { done++; donePts += t.points; }
      if (ratings[taskId(idx)]) { rated++; }
    }
  });

  if (currentMode === 'rating') {
    const pct = total ? Math.round(rated / total * 100) : 0;
    document.getElementById('statTasksWrap').style.display = 'none';
    document.getElementById('statRatedWrap').style.display = '';
    document.getElementById('statRated').textContent = `${rated} / ${total}`;
    document.getElementById('globalBar').style.width  = pct + '%';
    document.getElementById('globalPct').textContent  = pct + '%';
  } else {
    const pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById('statTasksWrap').style.display = '';
    document.getElementById('statRatedWrap').style.display = 'none';
    document.getElementById('statTasks').textContent  = `${done} / ${total}`;
    document.getElementById('statPoints').textContent = `${donePts} / ${totalPts}`;
    document.getElementById('globalBar').style.width  = pct + '%';
    document.getElementById('globalPct').textContent  = pct + '%';
  }
}

function updateRatingLegend() {
  const labels = currentLang === 'ru' ? RATING_LABELS_RU : RATING_LABELS_EN;
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById('rl' + i);
    if (el) el.textContent = labels[i];
  }
  const lbl = document.getElementById('ratingLegendLabel');
  if (lbl) lbl.textContent = currentLang === 'ru' ? 'Оценки:' : 'Rating:';
}

function applyMode() {
  const isRating = currentMode === 'rating';
  document.body.classList.toggle('rating-mode', isRating);
  document.getElementById('modeRating').classList.toggle('active', isRating);
  document.getElementById('modeChecklist').classList.toggle('active', !isRating);
  document.getElementById('difficultyBar').style.display = isRating ? 'none' : '';
  document.getElementById('ratingLegendBar').style.display = isRating ? '' : 'none';
  if (isRating) updateRatingLegend();
}

document.getElementById('modeChecklist').addEventListener('click', () => {
  currentMode = 'checklist';
  applyMode();
  saveState();
  render();
});

document.getElementById('modeRating').addEventListener('click', () => {
  currentMode = 'rating';
  applyMode();
  saveState();
  render();
});

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentDiff = parseInt(btn.dataset.level);
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    saveState();
    render();
  });
});

document.getElementById('resetBtn').addEventListener('click', () => {
  const msg = currentMode === 'rating'
    ? (currentLang === 'ru' ? 'Сбросить все оценки?' : 'Reset all ratings?')
    : (currentLang === 'ru' ? 'Сбросить весь прогресс?' : 'Reset all progress?');
  if (confirm(msg)) {
    if (currentMode === 'rating') { ratings = {}; }
    else { checked = {}; }
    saveState(); render();
  }
});

function setLang(lang) {
  currentLang = lang;
  document.getElementById('langEn').classList.toggle('active', lang === 'en');
  document.getElementById('langRu').classList.toggle('active', lang === 'ru');
  if (currentMode === 'rating') updateRatingLegend();
  saveState();
  render();
}

document.getElementById('langEn').addEventListener('click', () => setLang('en'));
document.getElementById('langRu').addEventListener('click', () => setLang('ru'));

loadState();
document.querySelectorAll('.diff-btn').forEach(b => {
  b.classList.toggle('active', parseInt(b.dataset.level) === currentDiff);
});
document.getElementById('langEn').classList.toggle('active', currentLang === 'en');
document.getElementById('langRu').classList.toggle('active', currentLang === 'ru');
applyMode();
render();
</script>
</body>
</html>
